<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Calendar AI Assistant</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 배경 그래디언트 오브젝트 -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <!-- 헤더 영역 -->
        <header class="app-header">
            <div class="header-logo">
                <i class="fa-solid fa-calendar-days logo-icon"></i>
                <div class="logo-text">
                    <h1>Chronos AI</h1>
                    <span class="sub-text">Google Calendar Intelligent Assistant</span>
                </div>
            </div>
            <div class="system-status">
                <div class="status-badge" id="statusBadge">
                    <span class="pulse-dot"></span>
                    <span class="status-label">서버 연결 중...</span>
                </div>
            </div>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main class="main-content">
            <!-- 챗 영역 -->
            <section class="chat-section">
                <div class="chat-messages" id="chatMessages">
                    <!-- 환영 메시지 -->
                    <div class="message system">
                        <div class="message-avatar">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <p>안녕하세요! 스마트 구글 캘린더 비서 <strong>Chronos AI</strong>입니다. 📅</p>
                            <p>자연어로 말씀해 주시면 일정을 알아서 생성하고, 찾고, 취소해 드립니다. 아래 예시처럼 편하게 요청해 보세요!</p>
                            <div class="example-chips">
                                <button class="chip" onclick="useExample(this)">"내일 오후 3시에 2시간 동안 마케팅 기획 회의 등록해줘"</button>
                                <button class="chip" onclick="useExample(this)">"이번 주 내 일정을 모두 조회해줘"</button>
                                <button class="chip" onclick="useExample(this)">"마케팅 회의 일정 취소해줘"</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 입력 창 영역 -->
                <div class="chat-input-area">
                    <form id="chatForm" class="input-form">
                        <input type="text" id="userInput" placeholder="캘린더 일정을 자연어로 입력하세요..." autocomplete="off" required>
                        <button type="submit" class="send-btn" id="sendBtn">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Custom Script -->
    <script src="app.js"></script>
</body>
</html>
